<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Comparador de Times</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script defer src="seu_script.js"></script> <!-- Substitua com o nome correto do seu script -->
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        select, button {
            margin: 10px 0;
            padding: 8px;
            width: 100%;
        }
        #resultado {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Comparar Desempenho de Times</h1>

    <label for="liga">Campeonato:</label>
    <select id="liga">
        <option value="">Selecionar</option>
    </select>

    <label for="side">Lado:</label>
    <select id="side">
        <option value="">Todos</option>
    </select>

    <label for="jogosRecentes">Qtd. Jogos Recentes:</label>
    <select id="jogosRecentes">
        <option value="">Todos</option>
    </select>

    <label for="time1">Time 1:</label>
    <select id="time1"></select>

    <label for="time2">Time 2:</label>
    <select id="time2"></select>

    <button onclick="comparar()">Comparar</button>

    <div id="resultado"></div>

</body>
</html>
