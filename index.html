<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Times LoL</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <h1>Comparador de Times LoL</h1>

    <div>
        <label for="liga">Campeonato:</label>
        <select id="liga">
            <option value="">Selecionar</option>
        </select>
    </div>

    <div>
        <label for="side">Lado:</label>
        <select id="side">
            <!-- Opções inseridas via JS -->
        </select>
    </div>

    <div>
        <label for="jogosRecentes">Qtd. Jogos Recentes:</label>
        <select id="jogosRecentes">
            <!-- Opções inseridas via JS -->
        </select>
    </div>

    <div>
        <label for="time1">Time 1:</label>
        <select id="time1">
            <!-- Opções inseridas após escolha do campeonato -->
        </select>
    </div>

    <div>
        <label for="time2">Time 2:</label>
        <select id="time2">
            <!-- Opções inseridas após escolha do campeonato -->
        </select>
    </div>

    <button onclick="comparar()">Comparar</button>

    <div id="resultado"></div>

    <script src="static/script.js"></script>
</body>
</html>
