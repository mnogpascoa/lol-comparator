<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Times LoL</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <h1>Comparador de Times LoL</h1>

    <div>
        <label for="liga">Campeonato:</label>
        <select id="liga" onchange="filtrarPorLiga()"></select>
    </div>

    <div>
        <label for="side">Lado:</label>
        <select id="side" onchange="filtrarPorSide()"></select>
    </div>

    <div>
        <label for="time1">Time 1:</label>
        <select id="time1"></select>
    </div>

    <div>
        <label for="time2">Time 2:</label>
        <select id="time2"></select>
    </div>

    <div>
        <label for="jogosRecentes">Jogos Recentes:</label>
        <select id="jogosRecentes">
            <option value="">Todos</option>
            <option value="10">Últimos 10</option>
            <option value="20">Últimos 20</option>
            <option value="30">Últimos 30</option>
            <option value="40">Últimos 40</option>
            <option value="50">Últimos 50</option>
        </select>
    </div>

    <button onclick="comparar()">Comparar</button>

    <div id="resultado"></div>

    <script src="static/script.js"></script>
</body>
</html>
