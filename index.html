<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comparador de Times LoL</title>
    <link rel="stylesheet" href="static/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <h1>Comparador de Times LoL</h1>

    <div>
        <label for="side">Lado:</label>
        <select id="side" onchange="limparTimes();">
            <option value="Todos">Todos</option>
        </select>
    </div>

    <div>
        <label for="time1">Time 1:</label>
        <input type="text" id="time1" autocomplete="off" oninput="mostrarSugestoes(this, 'sugestoesTime1')" />
        <div id="sugestoesTime1" class="sugestoes-container"></div>
    </div>

    <div>
        <label for="time2">Time 2:</label>
        <input type="text" id="time2" autocomplete="off" oninput="mostrarSugestoes(this, 'sugestoesTime2')" />
        <div id="sugestoesTime2" class="sugestoes-container"></div>
    </div>

    <div>
        <label for="liga">Campeonato:</label>
        <select id="liga">
            <option value="Todos">Todos</option>
        </select>
    </div>

    <button onclick="comparar()">Comparar</button>

    <div id="resultado"></div>

    <script src="static/script.js"></script>
</body>
</html>
